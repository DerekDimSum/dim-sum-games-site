<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found | Dim Sum Games</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/favicon.png" />

  <!-- Compiled Tailwind CSS (no runtime CDN) -->
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Nunito', system-ui, sans-serif; }
    .font-display { font-family: 'Baloo 2', system-ui, sans-serif; }
  </style>
</head>

<body class="bg-white text-ink font-body antialiased">

  <!-- ===== Nav ===== -->
  <header class="sticky top-0 z-50 border-b border-slate-100 bg-white/90 backdrop-blur">
    <div class="mx-auto flex h-16 max-w-5xl items-center justify-between px-6">
      <a href="/" class="flex items-center gap-2 font-display text-lg font-extrabold">
        <img src="/assets/logo-icon.png" alt="" width="32" height="32" class="h-8 w-8" />
        <span>Dim Sum Games</span>
      </a>
      <nav class="flex items-center gap-6 text-sm font-bold text-slate-600">
        <a href="/#games" class="hidden transition-colors hover:text-coral sm:inline">Games</a>
        <a href="/#contact" class="hidden transition-colors hover:text-coral sm:inline">Contact</a>
      </nav>
    </div>
  </header>

  <!-- ===== 404 ===== -->
  <main class="mx-auto max-w-xl px-6 py-24 text-center sm:py-32">
    <img src="/assets/logo-icon.png" alt="Dim Sum Games logo" width="96" height="96" class="mx-auto h-24 w-24" />
    <p class="mt-6 font-display text-6xl font-extrabold text-coral">404</p>
    <h1 class="mt-2 font-display text-2xl font-extrabold sm:text-3xl">Page not found</h1>
    <p class="mx-auto mt-3 max-w-sm font-semibold text-slate-500">
      Looks like this one isn’t on the menu. Let’s get you back to the good stuff.
    </p>
    <a href="/"
       class="mt-8 inline-block rounded-full bg-coral px-7 py-3.5 font-display text-base font-extrabold text-ink shadow-lg shadow-coral/25 transition hover:brightness-105 active:scale-95">
      Back to home
    </a>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="border-t border-slate-100">
    <div class="mx-auto max-w-5xl px-6 py-8">
      <div class="flex flex-col items-center gap-4 sm:flex-row sm:justify-between">
        <a href="/" class="flex items-center gap-2 font-display font-extrabold">
          <img src="/assets/logo-icon.png" alt="" width="24" height="24" class="h-6 w-6" /> Dim Sum Games
        </a>
        <nav class="flex flex-wrap items-center justify-center gap-x-6 gap-y-2 text-sm font-bold text-slate-500">
          <a href="/privacypolicy" class="transition-colors hover:text-coral">Privacy Policy</a>
          <a href="/termsofservice" class="transition-colors hover:text-coral">Terms of Service</a>
          <a href="mailto:support@dimsumgames.com" class="transition-colors hover:text-coral">Support</a>
        </nav>
      </div>
      <p class="mt-6 text-center text-xs font-semibold text-slate-400">
        © <span id="year"></span> Dim Sum Games Pte. Ltd. All rights reserved.
      </p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
